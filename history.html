<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clone History — Nova Clone</title>
    <script>document.documentElement.style.visibility="hidden"</script>
  </head>
  <body>
    <div class="main-layout">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <img class="logo-icon" src="/icon.svg" alt="Nova Clone">
          <div class="logo-text" data-i18n="app.name">Nova <span>Clone</span></div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group">
            <div class="nav-group-label" data-i18n="navGroup.general">General</div>
            <a class="nav-item" href="/" id="nav-clone" data-i18n="nav.clone">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" />
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
              </svg>
              Clone
            </a>
            <a class="nav-item active" href="/history.html" id="nav-history" data-i18n="nav.history">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12,6 12,12 16,14" />
              </svg>
              History
            </a>
          </div>
          <div class="nav-group">
            <div class="nav-group-label" data-i18n="navGroup.settings">Settings</div>
            <a class="nav-item" href="/settings.html" id="nav-settings" data-i18n="nav.general">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
              </svg>
              General
            </a>
          </div>
        </nav>
        <div class="sidebar-footer">
          <div>&copy; 2026 Nova Clone</div>
          <div><a href="https://github.com/rostyslavudovenko/nova-clone/blob/main/LICENSE" target="_blank">Licensed under the MIT License</a> &middot; v0.1.2</div>
          <div>Developed with &hearts; by Rostyslav Udovenko</div>
          <div class="sidebar-footer-divider"></div>
          <div class="sidebar-footer-links">
            <a href="https://github.com/rostyslavudovenko/nova-clone" target="_blank">GitHub</a>
            &middot;
            <a href="https://github.com/rostyslavudovenko/nova-clone/issues" target="_blank">Feedback</a>
            &middot;
            <a href="mailto:rostyslavudovenko@icloud.com">Contact me</a>
          </div>
        </div>
      </aside>

      <div class="main-content">
        <header class="topbar">
          <div class="topbar-left"></div>
          <div class="topbar-right">
            <div id="connection-status" class="hidden">
              <div class="connection-profile">
                <div class="profile-avatar"></div>
                <div class="profile-details">
                  <div class="profile-email" id="connection-info"></div>
                  <div class="profile-site" id="topbar-content"></div>
                </div>
                </div>
            </div>
          </div>
        </header>

        <div class="main-scroll">
          <div class="main-container">
            <div class="card history-page">
              <div class="card-title" data-i18n="history.title">Clone History</div>
              <table class="history-table" id="history-table">
                <thead>
                  <tr>
                    <th data-i18n="history.source">Source</th>
                    <th data-i18n="history.target">Target</th>
                    <th data-i18n="history.timestamp">Date</th>
                    <th data-i18n="history.status">Status</th>
                    <th data-i18n="history.actions">Actions</th>
                  </tr>
                </thead>
                <tbody id="history-body"></tbody>
              </table>
              <div class="history-empty" id="history-empty" data-i18n="history.empty">No clone history yet.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/history.ts"></script>
  </body>
</html>
