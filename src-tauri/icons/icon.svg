<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f2fa"/>
    </linearGradient>
    <linearGradient id="arrowPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8f6cf0"/>
      <stop offset="100%" stop-color="#5a3bd6"/>
    </linearGradient>
    <linearGradient id="arrowTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fe0c9"/>
      <stop offset="100%" stop-color="#2fb4c6"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <!-- Two arrows curving in opposite directions, forming a cycle (clone/sync motif) -->
  <g filter="url(#glow)">
    <!-- Top arc: purple, curves left-to-right. Flat (butt) caps so the line meets the arrowhead cleanly -->
    <path d="M 260 340 C 300 180, 560 110, 740 210" fill="none" stroke="url(#arrowPurple)" stroke-width="34" stroke-linecap="butt"/>
    <!-- Rounded tail for the top arc -->
    <circle cx="260" cy="340" r="17" fill="#8f6cf0"/>

    <!-- Bottom arc: teal, curves right-to-left. Flat (butt) caps so the line meets the arrowhead cleanly -->
    <path d="M 764 520 C 724 680, 464 750, 284 650" fill="none" stroke="url(#arrowTeal)" stroke-width="34" stroke-linecap="butt"/>
    <!-- Rounded tail for the bottom arc -->
    <circle cx="764" cy="520" r="17" fill="#2fb4c6"/>
  </g>

  <!-- Arrowhead for top (purple) path: base flares wider than the line for a classic arrow look -->
  <polygon points="799.4,243.0 726.4,234.5 753.6,185.5" fill="url(#arrowPurple)"/>
  <!-- Arrowhead for bottom (teal) path: base flares wider than the line for a classic arrow look -->
  <polygon points="224.6,617.0 297.6,625.5 270.4,674.5" fill="url(#arrowTeal)"/>

  <!-- Wordmark, placed in the open space between the two arcs -->
  <text x="512" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="86" fill="#2c2f3a" letter-spacing="4">NOVA</text>
  <text x="512" y="500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="36" fill="#5a5f6e" letter-spacing="12">CLONE</text>
</svg>
